<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartSpend — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f8;
      --muted: #6b6b80;
      --accent1: #ff6b35;
      --accent2: #7c3aed;
      --accent3: #06d6a0;
      --accent4: #ffd166;
      --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .blob1 { width:400px; height:400px; background:var(--accent2); top:-100px; left:-100px; animation-delay:0s; }
    .blob2 { width:300px; height:300px; background:var(--accent1); bottom:-80px; right:-80px; animation-delay:3s; }
    .blob3 { width:200px; height:200px; background:var(--accent3); top:50%; left:60%; animation-delay:1.5s; }
    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-20px) scale(1.05); }
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 24px;
      animation: fadeUp 0.6s ease both;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .brand-logo span { color: var(--accent1); }
    .brand-tagline { color: var(--muted); font-size: 0.88rem; margin-top: 6px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(10px);
    }

    .tab-row {
      display: flex;
      background: var(--surface2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 9px;
      color: var(--muted);
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .form-section { display: none; }
    .form-section.active { display: block; animation: fadeUp 0.3s ease both; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }
    .form-input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent2), #a855f7);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      padding: 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-google:hover { border-color: rgba(255,255,255,0.2); background: #222230; }

    .google-icon { width: 18px; height: 18px; }

    .error-msg {
      background: rgba(255,71,87,0.1);
      border: 1px solid rgba(255,71,87,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #ff8a95;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; animation: fadeUp 0.2s ease both; }

    .success-msg {
      background: rgba(6,214,160,0.1);
      border: 1px solid rgba(6,214,160,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--accent3);
      margin-bottom: 16px;
      display: none;
    }
    .success-msg.show { display: block; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="login-wrap">
    <div class="brand">
      <div class="brand-logo">Smart<span>Spend</span></div>
      <div class="brand-tagline">Take control of your money, one day at a time.</div>
    </div>

    <div class="card">
      <div class="tab-row">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div class="form-section active" id="section-login">
        <div class="error-msg" id="login-error"></div>
        <div class="success-msg" id="login-success"></div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" id="login-username" type="text" placeholder="Enter your username" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="login-password" type="password" placeholder="Enter your password" required/>
        </div>
        <button class="btn-primary" onclick="handleLogin()">Login →</button>
        <div class="divider">or</div>
        <button class="btn-google" onclick="alert('Google OAuth — connect via Flask-OAuth in production')">
          <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </div>

      <!-- SIGNUP FORM -->
      <div class="form-section" id="section-signup">
        <div class="error-msg" id="signup-error"></div>
        <div class="success-msg" id="signup-success"></div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" id="signup-username" type="text" placeholder="Choose a username" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="signup-password" type="password" placeholder="Create a password" required/>
        </div>
        <button class="btn-primary" onclick="handleSignup()">Create Account →</button>
        <div class="divider">or</div>
        <button class="btn-google" onclick="alert('Google OAuth — connect via Flask-OAuth in production')">
          <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </div>
    </div>
  </div>

<script>
  const BASE = 'http://127.0.0.1:5000';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
    document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById(`section-${tab}`).classList.add('active');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError(id) { document.getElementById(id).classList.remove('show'); }
  function showSuccess(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }

  async function handleLogin() {
    hideError('login-error');
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) return showError('login-error', 'Please fill in all fields.');

    try {
      const res = await fetch(`${BASE}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const d = await res.json();
      if (!res.ok) return showError('login-error', d.error || 'Login failed.');
      localStorage.setItem('user_id', d.user_id);
      localStorage.setItem('username', username);
      showSuccess('login-success', '✓ Login successful! Redirecting...');
      setTimeout(() => window.location.href = '/dashboard', 800);
    } catch {
      showError('login-error', 'Cannot connect to server. Is Flask running?');
    }
  }

  async function handleSignup() {
    hideError('signup-error');
    const username = document.getElementById('signup-username').value.trim();
    const password = document.getElementById('signup-password').value;
    if (!username || !password) return showError('signup-error', 'Please fill in all fields.');
    if (password.length < 4) return showError('signup-error', 'Password must be at least 4 characters.');

    try {
      const res = await fetch(`${BASE}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const d = await res.json();
      if (!res.ok) return showError('signup-error', d.error || 'Signup failed.');
      localStorage.setItem('user_id', d.user_id);
      localStorage.setItem('username', username);
      showSuccess('signup-success', '✓ Account created! Redirecting to setup...');
      setTimeout(() => window.location.href = '/onboarding', 800);
    } catch {
      showError('signup-error', 'Cannot connect to server. Is Flask running?');
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const active = document.querySelector('.form-section.active').id;
      active === 'section-login' ? handleLogin() : handleSignup();
    }
  });
</script>
</body>
</html>
